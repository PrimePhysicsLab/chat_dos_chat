<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>A Praça - VIP</title>
    <style>
        /* --- ESTILOS --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; height: 100svh; display: flex; justify-content: center; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: #fff; height: 100%; display: flex; flex-direction: column; position: relative; }
        .header { padding: 15px; border-bottom: 1px solid #dbdbdb; display: flex; align-items: center; justify-content: space-between; font-weight: bold; }
        .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* LOGIN */
        #login-screen { padding: 40px 20px; justify-content: center; align-items: center; }
        .input-box { width: 100%; position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; width: 100%; font-size: 16px; }
        .btn-ver { position: absolute; right: 10px; top: 14px; border: none; background: none; color: #0084ff; font-weight: bold; cursor: pointer; }

        /* CHAT */
        #msgs { flex: 1; overflow-y: auto; padding: 15px; background: #f9f9f9; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 8px 14px; border-radius: 18px; font-size: 14px; max-width: 85%; position: relative; }
        .msg-me { align-self: flex-end; background: #0084ff; color: #fff; }
        .msg-others { align-self: flex-start; background: #e4e6eb; color: #000; }
        
        /* BLOCO: OS CHECKS (V) */
        .info { font-size: 10px; display: flex; align-items: center; justify-content: flex-end; gap: 3px; margin-top: 3px; opacity: 0.8; }
        .check-enviando { color: #ccc; } /* Um V cinza */
        .check-recebido { color: #fff; } /* Dois V brancos (ainda não lido) */
        .check-lido { color: #40c4ff; font-weight: bold; } /* Dois V azuis (lido!) */

        .u-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; }
        #typing-msg { height: 20px; font-size: 11px; color: #0084ff; padding: 0 15px; font-style: italic; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen">
        <h1>A Praça</h1>
        <div class="input-box"><input type="text" id="user" placeholder="Usuário"></div>
        <div class="input-box"><input type="password" id="pass" placeholder="Senha"><button class="btn-ver" onclick="ver()">VER</button></div>
        <button onclick="entrar()" style="width:100%; padding:15px; background:#0084ff; color:#fff; border:none; border-radius:10px; font-weight:bold;">Entrar</button>
        <button onclick="cadastrar()" style="border:none; background:none; color:#0084ff; margin-top:20px;">Criar conta</button>
    </div>

    <div id="list-screen" class="screen" style="display:none">
        <div class="header"><span>Conversas</span><button onclick="location.reload()" style="border:none; color:red; background:none;">Sair</button></div>
        <div id="user-list"></div>
    </div>

    <div id="chat-screen" class="screen" style="display:none">
        <div class="header"><button onclick="voltar()" style="border:none; background:none; font-size:24px;">‹</button><span id="c-nome"></span><div style="width:30px"></div></div>
        <div id="msgs"></div>
        <div id="typing-msg"></div>
        <div style="padding:10px; display:flex; gap:8px; border-top:1px solid #ddd;">
            <input type="text" id="m-in" placeholder="Mensagem..." style="flex:1; border-radius:20px; padding:10px;">
            <button onclick="enviar()" style="border:none; background:none; color:#0084ff; font-weight:bold; font-size:20px;">➤</button>
        </div>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec";
    let eu = "", outro = "", lastQ = 0;

    function ver() { const p = document.getElementById('pass'); p.type = p.type === 'password' ? 'text' : 'password'; }

    async function entrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        const r = await fetch(`${URL}?acao=login&u=${u}&s=${s}`);
        if(await r.text() === "ok") {
            eu = u.toLowerCase();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('list-screen').style.display = 'flex';
            setInterval(sync, 3000);
        } else { alert("Erro!"); }
    }

    async function sync() {
        const r = await fetch(`${URL}?eu=${eu}&outro=${outro}&acao=get_all`);
        const d = await r.json();
        
        if(!outro) {
            document.getElementById('user-list').innerHTML = d.usuarios.map(u => {
                if(u.nome.toLowerCase() === eu) return '';
                return `<div class="u-item" onclick="abrir('${u.nome}')"><span>${u.nome}</span><span style="color:${u.status==='online'?'green':'#ccc'}">${u.status}</span></div>`;
            }).join('');
        } else {
            // Se estou no chat, aviso que li as mensagens do outro
            fetch(`${URL}?acao=marcar_lido&eu=${eu}&outro=${outro}`);
            
            document.getElementById('typing-msg').innerText = d.digitando ? d.digitando + " está digitando..." : "";
            
            if(d.mensagens.length !== lastQ) {
                document.getElementById('msgs').innerHTML = d.mensagens.map(m => {
                    const isMe = m.u.toLowerCase() === eu;
                    // LÓGICA DO CHECK:
                    let checkHtml = "";
                    if(isMe) {
                        if(m.s === "lido") checkHtml = `<span class="check-lido">✓✓</span>`;
                        else checkHtml = `<span class="check-recebido">✓✓</span>`;
                    }
                    return `<div class="bubble ${isMe?'msg-me':'msg-others'}">${m.m}<div class="info"><span>${m.h}</span>${checkHtml}</div></div>`;
                }).join('');
                document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
                lastQ = d.mensagens.length;
            }
        }
    }

    function abrir(n) { 
        outro = n; lastQ = 0;
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('c-nome').innerText = n;
    }

    function voltar() { outro = ""; document.getElementById('chat-screen').style.display = 'none'; document.getElementById('list-screen').style.display = 'flex'; }

    function enviar() {
        const i = document.getElementById('m-in');
        if(!i.value.trim()) return;
        // Ao clicar, a mensagem aparece com 1 check cinza (enviando/local) temporariamente se quiser, 
        // mas aqui vamos focar na gravação da planilha
        fetch(URL, { method:'POST', mode:'no-cors', body: JSON.stringify({ tipo:'mensagem', usuario:eu, para:outro, msg:i.value }) });
        i.value = "";
    }

    // LISTENER DIGITANDO
    document.getElementById('m-in').addEventListener('input', () => {
        fetch(`${URL}?acao=set_typing&u=${eu}&status=sim`);
        clearTimeout(window.t);
        window.t = setTimeout(() => fetch(`${URL}?acao=set_typing&u=${eu}&status=nao`), 4000);
    });
</script>
</body>
</html>
