<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>A Praça VIP</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; margin: 0; height: 100svh; display: flex; justify-content: center; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: #fff; height: 100%; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { padding: 15px; border-bottom: 1px solid #dbdbdb; display: flex; align-items: center; justify-content: space-between; font-weight: bold; background: #fff; }
        .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* LOGIN */
        #login-screen { padding: 40px 20px; justify-content: center; align-items: center; text-align: center; }
        .input-box { width: 100%; position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; background: #fafafa; outline: none; }
        .btn-ver { position: absolute; right: 15px; top: 18px; border: none; background: none; color: #0084ff; font-weight: bold; cursor: pointer; }
        .btn-main { width: 100%; padding: 16px; border: none; border-radius: 12px; background: #0084ff; color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* LISTA */
        .u-item { padding: 18px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: #45bd62; } .offline { background: #ccc; }

        /* CHAT */
        #msgs { flex: 1; overflow-y: auto; padding: 15px; background: #f9f9f9; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; max-width: 80%; line-height: 1.4; position: relative; }
        .msg-me { align-self: flex-end; background: #0084ff; color: #fff; border-bottom-right-radius: 4px; }
        .msg-others { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 4px; }
        .info { font-size: 9px; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; opacity: 0.9; }
        
        #typing-msg { height: 24px; font-size: 11px; color: #0084ff; padding: 0 15px; font-style: italic; display: flex; align-items: center; }
        .check-v { font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen">
        <h1 style="color:#0084ff; font-size: 38px; margin-bottom: 40px;">A Praça</h1>
        <div class="input-box"><input type="text" id="user" placeholder="Usuário"></div>
        <div class="input-box">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-ver" onclick="togglePass()">VER</button>
        </div>
        <button class="btn-main" onclick="entrar()">Entrar</button>
        <p id="st-login" style="font-size:12px; color:gray; margin-top:15px;"></p>
        <button onclick="cadastrar()" style="border:none; background:none; color:#0084ff; margin-top:20px; font-weight:bold;">Criar nova conta</button>
    </div>

    <div id="list-screen" class="screen" style="display:none">
        <div class="header">
            <span>Conversas</span>
            <button onclick="fazerLogout()" style="border:none; background:none; color:#ff3b30; font-weight:bold;">Sair</button>
        </div>
        <div id="user-list"></div>
    </div>

    <div id="chat-screen" class="screen" style="display:none">
        <div class="header">
            <button onclick="voltar()" style="border:none; background:none; font-size:28px; cursor:pointer;">‹</button>
            <span id="c-nome">Chat</span>
            <div style="width:30px"></div>
        </div>
        <div id="msgs"></div>
        <div id="typing-msg"></div>
        <div style="padding:12px; display:flex; gap:10px; border-top:1px solid #eee; background:#fff;">
            <input type="text" id="m-in" placeholder="Mensagem..." style="border-radius:25px; flex:1;">
            <button onclick="enviar()" style="border:none; background:none; color:#0084ff; font-weight:bold; font-size:22px;">➤</button>
        </div>
    </div>
</div>

<audio id="s-pop" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>
<audio id="s-type" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec"; // COLOQUE SEU LINK AQUI
    let eu = "", outro = "", lastQ = 0;

    function togglePass() {
        const p = document.getElementById('pass');
        p.type = p.type === 'password' ? 'text' : 'password';
    }

    async function entrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(!u || !s) return;
        document.getElementById('st-login').innerText = "conectando...";
        
        const r = await fetch(`${URL_SCRIPT}?acao=login&u=${u}&s=${s}`);
        const resTxt = await r.text();
        if(resTxt === "ok") {
            eu = u.toLowerCase();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('list-screen').style.display = 'flex';
            setInterval(sync, 3000);
        } else {
            alert("Usuário ou senha incorretos.");
            document.getElementById('st-login').innerText = "";
        }
    }

    async function fazerLogout() {
        await fetch(`${URL_SCRIPT}?acao=logout&u=${eu}`);
        location.reload();
    }

    async function sync() {
        try {
            const r = await fetch(`${URL_SCRIPT}?eu=${eu}&outro=${outro}&acao=get_all`);
            const d = await r.json();

            // Atualiza Lista de Usuários
            if(outro === "") {
                document.getElementById('user-list').innerHTML = d.usuarios.map(u => {
                    if(u.nome.toLowerCase() === eu) return '';
                    return `<div class="u-item" onclick="abrirChat('${u.nome}')">
                        <span>${u.nome}</span>
                        <span style="font-size:12px; color:${u.status==='online'?'#45bd62':'#999'}">
                            <span class="dot ${u.status}"></span>${u.status}
                        </span>
                    </div>`;
                }).join('');
            }

            // Chat Ativo
            if(outro !== "") {
                // Marcar como lido as dele
                fetch(`${URL_SCRIPT}?acao=ler&eu=${eu}&outro=${outro}`);

                // Som e Texto de digitando
                const tMsg = document.getElementById('typing-msg');
                if(d.digitando && d.digitando.toLowerCase() === outro.toLowerCase()) {
                    if(tMsg.innerText === "") document.getElementById('s-type').play().catch(()=>{});
                    tMsg.innerText = d.digitando + " está digitando...";
                } else {
                    tMsg.innerText = "";
                }

                // Mensagens
                if(d.mensagens.length !== lastQ) {
                    document.getElementById('msgs').innerHTML = d.mensagens.map(m => {
                        const isMe = m.u.toLowerCase() === eu;
                        let checks = "";
                        if(isMe) {
                            const cor = m.s === "SIM" ? "#40c4ff" : "#fff";
                            checks = `<span class="check-v" style="color:${cor}">✓✓</span>`;
                        }
                        return `<div class="bubble ${isMe?'msg-me':'msg-others'}">
                            ${m.m}
                            <div class="info"><span>${m.h}</span>${checks}</div>
                        </div>`;
                    }).join('');
                    document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
                    if(lastQ > 0 && d.mensagens.length > lastQ && d.mensagens[d.mensagens.length-1].u.toLowerCase() !== eu) {
                        document.getElementById('s-pop').play();
                    }
                    lastQ = d.mensagens.length;
                }
            }
        } catch(e) {}
    }

    function abrirChat(nome) {
        outro = nome;
        lastQ = 0;
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('c-nome').innerText = nome;
    }

    function voltar() {
        outro = "";
        document.getElementById('chat-screen').style.display = 'none';
        document.getElementById('list-screen').style.display = 'flex';
    }

    function enviar() {
        const input = document.getElementById('m-in');
        const txt = input.value.trim();
        if(!txt) return;
        fetch(URL_SCRIPT, { method:'POST', mode:'no-cors', body: JSON.stringify({ tipo:'mensagem', usuario:eu, para:outro, msg:txt }) });
        input.value = "";
        fetch(`${URL_SCRIPT}?acao=set_typing&u=${eu}&status=nao`);
    }

    // LISTENER DIGITANDO
    document.getElementById('m-in').addEventListener('input', () => {
        fetch(`${URL_SCRIPT}?acao=set_typing&u=${eu}&status=sim`);
        clearTimeout(window.tTyp);
        window.tTyp = setTimeout(() => fetch(`${URL_SCRIPT}?acao=set_typing&u=${eu}&status=nao`), 4000);
    });

    function cadastrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(!u || !s) return alert("Preencha tudo");
        fetch(URL_SCRIPT, { method:'POST', mode:'no-cors', body: JSON.stringify({ tipo:'cadastro', usuario:u, senha:s }) });
        alert("Conta enviada! Tente logar.");
    }
</script>
</body>
</html>
