<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sky Premium</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            background: #000000;
            margin: 0;
            padding: 0;
            height: 100svh; 
            width: 100%;
            overflow: hidden;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }
        
        #app { 
            width: 100%; 
            max-width: 500px; 
            background: #000000; 
            height: 100svh; 
            display: flex; 
            flex-direction: column; 
            position: relative;
        }
        
        /* Cabeçalho Rosa Sky */
        .header { 
            background: #12050c; 
            color: #ff66cc; 
            padding: 18px 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            font-weight: bold; 
            z-index: 10; 
            border-bottom: 2px solid #ff33aa;
            flex-shrink: 0;
            padding-top: calc(14px + env(safe-area-inset-top));
        }
        .btn-header { 
            border: none; 
            background: none; 
            color: #ff99dd; 
            font-size: 14px; 
            cursor: pointer; 
            font-weight: 600;
        }

        .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; height: 100%; }

        /* TELA DE LOGIN */
        #login-screen { background: #000000; padding: 30px; justify-content: center; align-items: center; text-align: center; }
        .logo-box { 
            background: #ff33aa; 
            width: 75px; 
            height: 75px; 
            border-radius: 22px; 
            margin: 0 auto 20px auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 38px;
            box-shadow: 0 0 15px rgba(255, 51, 170, 0.5);
        }
        .input-group { width: 100%; margin-bottom: 18px; }
        
        input[type="text"], input[type="password"] { 
            width: 100%; 
            padding: 16px; 
            border: 2px solid #331122; 
            border-radius: 14px; 
            font-size: 16px; 
            outline: none; 
            background: #121212; 
            color: #ffffff;
        }
        input:focus { border-color: #ff33aa; }
        
        .btn-entrar { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 14px; 
            background: #ff33aa; 
            color: white; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
        }

        /* ÁREA DAS MENSAGENS */
        #msgs { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
            background: #000000;
            -webkit-overflow-scrolling: touch; 
        }
        
        /* Balões Grandes e Textos Confortáveis */
        .bubble { 
            padding: 16px 20px; 
            font-size: 17px; 
            max-width: 85%; 
            border-radius: 22px; 
            box-shadow: 0 2px 8px rgba(255, 51, 170, 0.1);
            line-height: 1.5;
            color: #ffffff; 
            word-wrap: break-word;
        }
        .msg-me { 
            align-self: flex-end; 
            background: linear-gradient(135deg, #5a0f3b, #3d0526); 
            border-bottom-right-radius: 4px; 
            border: 1px solid #9c1c66;
        }
        .msg-others { 
            align-self: flex-start; 
            background: linear-gradient(135deg, #222222, #161616); 
            border-bottom-left-radius: 4px; 
            border: 1px solid #444;
        }
        
        .meta-check { text-align: right; font-size: 12px; font-weight: bold; margin-top: 6px; display: block; }
        .check-enviado { color: #555555; }
        .check-lido { color: #ff33aa; }

        #chat-title { font-size: 18px; color: #ffffff; font-weight: bold; }
        #status-topo { font-size: 13px; color: #ff99dd; margin-top: 2px; }
        
        /* ÁREA DE DIGITAÇÃO FIXA, GIGANTE E ROBUSTA */
        .input-area { 
            background: #050505; 
            padding: 20px 16px; 
            display: flex; 
            gap: 12px; 
            align-items: center;
            border-top: 1px solid #22111c;
            padding-bottom: calc(20px + env(safe-area-inset-bottom)); 
            flex-shrink: 0;
        }
        
        #msg-input { 
            flex: 1; 
            border-radius: 30px; 
            padding: 20px 26px; 
            border: 2px solid #331122; 
            outline: none; 
            background: #141414;
            color: #ffffff;
            font-size: 18px; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            transition: border-color 0.2s;
        }
        #msg-input:focus { border-color: #ff33aa; }
        
        .btn-send { 
            background: #ff33aa; 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 58px; 
            height: 58px; 
            font-size: 24px; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(255, 51, 170, 0.4);
            flex-shrink: 0;
            transition: transform 0.1s;
        }
        .btn-send:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen">
        <div class="logo-box">✨</div>
        <h2 style="color:#ff33aa; margin:0 0 25px 0; font-size: 32px; letter-spacing: 2px; font-weight: bold;">Sky</h2>
        
        <div class="input-group">
            <input type="text" id="user" placeholder="Usuário" maxlength="10">
        </div>
        
        <div class="input-group">
            <input type="password" id="pass" placeholder="Senha (4 números)" inputmode="numeric" maxlength="4">
        </div>

        <button class="btn-entrar" onclick="entrar()">ENTRAR</button>
        <p id="status-log" style="font-size:13px; color:#ff99dd; margin-top:20px; min-height:15px;"></p>
        <button onclick="cadastrar()" style="background:none; border:none; color:#ff66cc; cursor:pointer; font-size:14px; margin-top: 10px; font-weight: bold;">Criar conta premium</button>
    </div>

    <div id="chat-screen" class="screen" style="display:none">
        <div class="header">
            <div>
                <div id="chat-title">Sky Chat</div>
                <div id="status-topo">conectando...</div>
            </div>
            <div>
                <button class="btn-header" onclick="limparTudo()" style="margin-right: 12px;">Limpar</button>
                <button class="btn-header" onclick="location.reload()">Sair</button>
            </div>
        </div>
        
        <div id="msgs"></div>
        
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Enviar mensagem..." autocomplete="off" oninput="dispararDigitando()">
            <button class="btn-send" onclick="enviar()">➤</button>
        </div>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec"; 
    
    let meuNome = "", ultimaQtd = 0, statusAba = "ativo", ultimoEstadoDigitando = "nao", timeoutDigitando = null;

    // Engine Física de Áudio do Sky
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function liberarAudioMobile() {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function tocarSomEnvio() {
        liberarAudioMobile();
        let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(850, audioCtx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
        osc.start(); osc.stop(audioCtx.currentTime + 0.08);
    }

    function tocarSomRecebimento() {
        liberarAudioMobile();
        let osc1 = audioCtx.createOscillator(); let osc2 = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
        osc1.type = 'sine'; osc1.frequency.setValueAtTime(520, audioCtx.currentTime);
        osc2.type = 'sine'; osc2.frequency.setValueAtTime(780, audioCtx.currentTime + 0.06);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.22);
        osc1.start(); osc2.start(); osc1.stop(audioCtx.currentTime + 0.22); osc2.stop(audioCtx.currentTime + 0.22);
    }

    function tocarSomDigitando() {
        liberarAudioMobile();
        let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'triangle'; osc.frequency.setValueAtTime(240, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.09, audioCtx.currentTime); // Volume levemente aumentado para celulares
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.06);
        osc.start(); osc.stop(audioCtx.currentTime + 0.06);
    }

    document.addEventListener("visibilitychange", () => {
        statusAba = document.hidden ? "inativo" : "ativo";
        enviarPresenca();
    });

    // Envia presença forçada ao servidor de forma imediata
    function enviarPresenca(digitando = "nao") {
        if(!meuNome) return;
        fetch(`${URL_SCRIPT}?acao=presenca&u=${meuNome}&status=${statusAba}&digitando=${digitando}`, { mode: 'no-cors' });
    }

    // Função instantânea acionada no teclado do celular
    function dispararDigitando() {
        liberarAudioMobile();
        const textoVal = document.getElementById('msg-input').value.trim();
        if(textoVal.length > 0) {
            enviarPresenca("sim");
            // Limpa o temporizador antigo e estende o status por mais 3 segundos
            clearTimeout(timeoutDigitando);
            timeoutDigitando = setTimeout(() => { enviarPresenca("nao"); }, 3000);
        } else {
            enviarPresenca("nao");
        }
    }

    async function entrar() {
        liberarAudioMobile();
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(!u || !s) return alert("Insira suas credenciais!");
        
        document.getElementById('status-log').innerText = "Entrando no Sky...";
        const res = await fetch(`${URL_SCRIPT}?acao=login&u=${encodeURIComponent(u)}&s=${encodeURIComponent(s)}`);
        
        if(await res.text() === "ok") {
            meuNome = u.toLowerCase();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            
            // Força sincronia imediata e ativa o loop contínuo
            sincronizar();
            setInterval(sincronizar, 2000); // Frequência ajustada para 2 segundos para maior precisão mobile
        } else {
            alert("Erro na autenticação.");
            document.getElementById('status-log').innerText = "";
        }
    }

    async function sincronizar() {
        try {
            // Informa que continuamos online no app
            fetch(`${URL_SCRIPT}?acao=ler&u=${meuNome}`, { mode: 'no-cors' });

            const res = await fetch(`${URL_SCRIPT}?u=${meuNome}`);
            const data = await res.json();

            // Atualização e Verificação em Tempo Real do Status Superior
            if (data.outro) {
                document.getElementById('chat-title').innerText = data.outro.nome.toUpperCase();
                let sTopo = document.getElementById('status-topo');
                
                if (data.outro.digitando === "sim") {
                    sTopo.innerText = "digitando...";
                    sTopo.style.color = "#ff33aa";
                    // Toca o som de digitação imediatamente caso mude o estado anterior
                    if (ultimoEstadoDigitando !== "sim") {
                        tocarSomDigitando();
                    }
                } else if (data.outro.status === "online") {
                    sTopo.innerText = "online agora";
                    sTopo.style.color = "#ff99dd";
                } else {
                    sTopo.innerText = "visto recentemente";
                    sTopo.style.color = "#555555";
                }
                ultimoEstadoDigitando = data.outro.digitando;
            }

            // Renderizador de Mensagens Limpo
            if(data.mensagens.length !== ultimaQtd) {
                document.getElementById('msgs').innerHTML = data.mensagens.map(m => {
                    const souEu = m.u.toLowerCase() === meuNome;
                    return `<div class="bubble ${souEu ? 'msg-me' : 'msg-others'}">${m.m}
                    ${souEu ? `<span class="meta-check ${m.lido ? 'check-lido' : 'check-enviado'}">✓✓</span>` : ''}</div>`;
                }).join('');
                
                let painelMsgs = document.getElementById('msgs');
                painelMsgs.scrollTop = painelMsgs.scrollHeight;
                
                if (ultimaQtd > 0 && data.mensagens.length > ultimaQtd) {
                    let ultMsg = data.mensagens[data.mensagens.length - 1];
                    if (ultMsg.u.toLowerCase() !== meuNome) {
                        tocarSomRecebimento();
                    }
                }
                ultimaQtd = data.mensagens.length;
            }
        } catch(e){}
    }

    function enviar() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        
        tocarSomEnvio(); 
        clearTimeout(timeoutDigitando);
        
        fetch(URL_SCRIPT, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ tipo: 'mensagem', usuario: meuNome, msg: input.value }) 
        });
        
        input.value = "";
        enviarPresenca("nao");
    }

    async function limparTudo() {
        if(confirm("Deseja deletar todo o histórico do Sky?")) { 
            await fetch(`${URL_SCRIPT}?acao=limpar`); 
            location.reload(); 
        }
    }

    async function cadastrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(u.length < 3 || s.length !== 4 || isNaN(s)) return alert("Usuário min 3 letras. Senha 4 números.");
        
        document.getElementById('status-log').innerText = "Processando...";
        await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: 'cadastro', usuario: u, senha: s }) });
        alert("Sua conta Premium no Sky foi gerada!");
        document.getElementById('status-log').innerText = "";
    }
</script>
</body>
</html>
