<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Praça</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #fafafa; margin: 0; display: flex; justify-content: center; height: 100svh; overflow: hidden; }
        #app { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; height: 100%; border-right: 1px solid #eee; border-left: 1px solid #eee; }
        .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; height: 100%; }
        input { width: 100%; padding: 14px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .btn-main { width: 100%; padding: 14px; background: #0095f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .user-card { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .on { color: #1fb141; font-size: 11px; font-weight: bold; }
        .off { color: #999; font-size: 11px; }
        #msgs { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 15px; background: #fdfdfd; }
        .bubble { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 14px; position: relative; }
        .msg-me { align-self: flex-end; background: #0095f6; color: white; }
        .msg-others { align-self: flex-start; background: #efefef; color: #333; }
        .time { font-size: 9px; opacity: 0.6; display: block; text-align: right; margin-top: 3px; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen" style="padding: 30px; justify-content: center;">
        <h2 style="text-align:center">A Praça</h2>
        <input type="text" id="user" placeholder="Nome (Só letras)" maxlength="10">
        <input type="password" id="pass" placeholder="Senha (4 números)" maxlength="4">
        <button class="btn-main" onclick="processar('login')">ENTRAR</button>
        <button onclick="processar('cadastro')" style="background:none; border:none; color:#0095f6; margin-top:15px; font-weight:bold; cursor:pointer">Criar Conta</button>
        <p id="feedback" style="text-align:center; font-size:12px; color:red"></p>
    </div>

    <div id="list-screen" class="screen" style="display:none">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center">
            <b>Conversas</b>
            <span onclick="location.reload()" style="color:red; cursor:pointer; font-size:13px">Sair</span>
        </div>
        <div id="user-list" style="overflow-y:auto"></div>
    </div>

    <div id="chat-screen" class="screen" style="display:none">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; align-items:center; gap:10px">
            <button onclick="voltar()" style="border:none; background:none; font-size:24px; cursor:pointer">‹</button>
            <b id="chat-title">Nome</b>
        </div>
        <div id="msgs"></div>
        <div style="padding:10px; display:flex; gap:8px; border-top:1px solid #eee">
            <input type="text" id="msg-input" placeholder="Mensagem..." style="margin:0; flex:1">
            <button onclick="enviar()" style="border:none; background:none; color:#0095f6; font-weight:bold">Enviar</button>
        </div>
    </div>
</div>

<audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
<audio id="snd-send" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec"; 
    let meuNome = "";
    let chatCom = "";
    let ultimaQtd = 0;

    async function processar(tipo) {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        const res = await fetch(`${URL_SCRIPT}?acao=${tipo}&u=${u}&s=${s}`);
        const txt = await res.text();

        if(txt.trim() === "ok") {
            if(tipo === 'cadastro') alert("Criado!");
            else {
                meuNome = u;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('list-screen').style.display = 'flex';
                carregarUsuarios();
                setInterval(carregarUsuarios, 5000); // Atualiza lista
                setInterval(() => { fetch(`${URL_SCRIPT}?acao=login&u=${meuNome}&s=${s}`); }, 20000); // Mantém Online
            }
        } else { document.getElementById('feedback').innerText = "Erro!"; }
    }

    async function carregarUsuarios() {
        const res = await fetch(`${URL_SCRIPT}?acao=get_users`);
        const users = await res.json();
        document.getElementById('user-list').innerHTML = users.map(u => {
            if(u.nome.toLowerCase() === meuNome.toLowerCase()) return '';
            return `<div class="user-card" onclick="abrirChat('${u.nome}')">
                <span>${u.nome}</span>
                <span class="${u.status==='Online'?'on':'off'}">${u.status}</span>
            </div>`;
        }).join('');
    }

    function abrirChat(nome) {
        chatCom = nome;
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-title').innerText = nome;
        ultimaQtd = 0;
        carregarMensagens();
        window.loopChat = setInterval(carregarMensagens, 3000);
    }

    async function carregarMensagens() {
        if(!chatCom) return;
        const res = await fetch(`${URL_SCRIPT}?acao=get_msgs&eu=${meuNome}&outro=${chatCom}`);
        const msgs = await res.json();
        if(msgs.length !== ultimaQtd) {
            document.getElementById('msgs').innerHTML = msgs.map(m => {
                const eu = m.u.toLowerCase() === meuNome.toLowerCase();
                return `<div class="bubble ${eu?'msg-me':'msg-others'}">${m.m}<span class="time">${m.h}</span></div>`;
            }).join('');
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
            if(ultimaQtd > 0 && msgs.length > ultimaQtd && !msgs[msgs.length-1].u.toLowerCase().includes(meuNome.toLowerCase())) document.getElementById('snd-pop').play();
            ultimaQtd = msgs.length;
        }
    }

    function enviar() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        document.getElementById('snd-send').play();
        fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
            tipo: 'mensagem', de: meuNome, para: chatCom, msg: input.value 
        }) });
        input.value = "";
        setTimeout(carregarMensagens, 400);
    }

    function voltar() { clearInterval(window.loopChat); chatCom = ""; document.getElementById('chat-screen').style.display = 'none'; document.getElementById('list-screen').style.display = 'flex'; }
</script>
</body>
</html>
