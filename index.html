<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Praça</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #fafafa; margin: 0; display: flex; justify-content: center; height: 100vh; }
        #app { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; border: 1px solid #ccc; position: relative; }
        .screen { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
        .regras { font-size: 11px; color: #666; background: #eee; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .btn-ver { position: absolute; right: 10px; top: 12px; border: none; background: none; color: #0095f6; font-weight: bold; cursor: pointer; }
        .btn-main { width: 100%; padding: 14px; background: #0095f6; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .user-card { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; cursor: pointer; }
        #msgs { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; background: #f9f9f9; }
        .bubble { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; }
        .msg-me { align-self: flex-end; background: #0095f6; color: white; }
        .msg-others { align-self: flex-start; background: #e5e5e5; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen">
        <h2 style="text-align:center">A Praça</h2>
        <div class="regras">
            <b>Atenção:</b><br>
            • Nome: Apenas letras (Máx 10).<br>
            • Senha: 4 números (Ex: 0012).
        </div>
        <input type="text" id="user" placeholder="Nome de usuário" maxlength="10">
        <div style="position:relative">
            <input type="password" id="pass" placeholder="Senha (4 números)" maxlength="4">
            <button class="btn-ver" onclick="togglePass()">VER</button>
        </div>
        <button class="btn-main" onclick="processar('login')">ENTRAR</button>
        <button onclick="processar('cadastro')" style="background:none; border:none; color:#0095f6; margin-top:20px; font-weight:bold; cursor:pointer">CRIAR CONTA</button>
        <p id="feedback" style="text-align:center; font-size:12px; color:red"></p>
    </div>

    <div id="list-screen" class="screen" style="display:none; padding:0">
        <div style="padding:15px; border-bottom:1px solid #ccc; display:flex; justify-content:space-between; font-weight:bold">
            <span>Conversas</span>
            <span onclick="location.reload()" style="color:red; cursor:pointer">Sair</span>
        </div>
        <div id="user-list"></div>
    </div>

    <div id="chat-screen" class="screen" style="display:none; padding:0">
        <div style="padding:15px; border-bottom:1px solid #ccc; display:flex; align-items:center; gap:10px">
            <button onclick="voltar()" style="border:none; background:none; font-size:20px; cursor:pointer">‹</button>
            <span id="chat-title" style="font-weight:bold">Chat</span>
        </div>
        <div id="msgs"></div>
        <div style="padding:10px; display:flex; gap:5px">
            <input type="text" id="msg-input" placeholder="Mensagem..." style="margin:0">
            <button onclick="enviar()" style="border:none; background:none; color:#0095f6; font-weight:bold">Enviar</button>
        </div>
    </div>
</div>

<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
<audio id="snd-send" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec"; 
    let meuNome = "";
    let ultimaQtd = 0;

    function som(id) { document.getElementById(id).play().catch(()=>{}); }
    function togglePass() {
        const p = document.getElementById('pass');
        p.type = p.type === "password" ? "text" : "password";
        som('snd-click');
    }

    async function processar(tipo) {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        const f = document.getElementById('feedback');

        if(!/^[A-Za-z]+$/.test(u)) { f.innerText="Nome só letras!"; return; }
        if(s.length !== 4 || isNaN(s)) { f.innerText="Senha 4 números!"; return; }

        som('snd-click');
        f.style.color = "gray";
        f.innerText = "carregando...";

        const res = await fetch(`${URL_SCRIPT}?acao=${tipo}&u=${u}&s=${s}`);
        const txt = await res.text();

        if(txt.trim() === "ok") {
            if(tipo === 'cadastro') {
                alert("Conta criada! Clique em entrar.");
                f.innerText = "";
            } else {
                meuNome = u.toLowerCase();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('list-screen').style.display = 'flex';
                carregarUsuarios();
                setInterval(carregarUsuarios, 10000);
            }
        } else {
            f.style.color = "red";
            f.innerText = (txt === "duplicado") ? "Nome já existe!" : "Usuário/Senha errados!";
        }
    }

    async function carregarUsuarios() {
        const res = await fetch(`${URL_SCRIPT}?acao=get_users`);
        const users = await res.json();
        document.getElementById('user-list').innerHTML = users.map(u => {
            if(u.nome.toLowerCase() === meuNome) return '';
            return `<div class="user-card" onclick="abrirChat('${u.nome}')">
                <span>${u.nome}</span>
                <span style="font-size:10px; color:${u.status==='Online'?'green':'#ccc'}">${u.status}</span>
            </div>`;
        }).join('');
    }

    function abrirChat(nome) {
        som('snd-click');
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-title').innerText = nome;
        carregarMensagens();
        window.loopChat = setInterval(carregarMensagens, 3000);
    }

    async function carregarMensagens() {
        const res = await fetch(URL_SCRIPT);
        const msgs = await res.json();
        if(msgs.length !== ultimaQtd) {
            document.getElementById('msgs').innerHTML = msgs.map(m => {
                const eu = m.u.toLowerCase() === meuNome;
                return `<div class="bubble ${eu?'msg-me':'msg-others'}">${m.m}</div>`;
            }).join('');
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
            if(ultimaQtd > 0 && msgs.length > ultimaQtd && msgs[msgs.length-1].u.toLowerCase() !== meuNome) som('snd-pop');
            ultimaQtd = msgs.length;
        }
    }

    function enviar() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        som('snd-send');
        fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: 'mensagem', usuario: meuNome, msg: input.value }) });
        input.value = "";
    }

    function voltar() { som('snd-click'); clearInterval(window.loopChat); document.getElementById('chat-screen').style.display = 'none'; document.getElementById('list-screen').style.display = 'flex'; }
</script>
</body>
</html>
